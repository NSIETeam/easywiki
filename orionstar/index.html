<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OrionStar Product KB + AI Writer</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#fff;color:#111}
:root{--blue:#2563EB;--navy:#0A2E6C;--border:#E5E7EB;--bg:#F8FAFC}
.hidden{display:none!important}
#loginPage{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0A2E6C,#2563EB)}
.login{width:360px;background:#fff;border-radius:14px;padding:40px 30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login h2{font-size:18px;color:var(--navy);margin-bottom:4px}
.login .sub{font-size:12px;color:#9CA3AF;margin-bottom:24px}
.login input{width:100%;padding:11px 14px;margin-bottom:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;outline:none}
.login input:focus{border-color:var(--blue)}
.login button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.login button:hover{background:#1D4ED8}
.login .err{color:#EF4444;font-size:12px;min-height:18px;margin-top:8px}
header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border)}
header .brand{font-weight:700;color:var(--navy);font-size:16px}
header .user{font-size:12px;color:#9CA3AF;display:flex;align-items:center;gap:8px}
header .user button{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;color:#6B7280}
.tools{padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
.tools input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;flex:1;min-width:180px;max-width:360px}
.tools input:focus{border-color:var(--blue)}
.fbtn{padding:5px 14px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:#374151}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.stats{padding:10px 24px;font-size:12px;color:#9CA3AF;display:flex;gap:16px}
.grid{padding:0 24px 32px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:.15s;background:#fff}
.card:hover{border-color:var(--blue);box-shadow:0 2px 12px rgba(37,99,235,.1)}
.card .cat{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-bottom:8px}
.cat.clean{background:#ECFDF5;color:#065F46}.cat.delivery{background:#FFF7ED;color:#C2410C}
.cat.voice{background:#EFF6FF;color:#1D4ED8}.cat.platform{background:#F5F3FF;color:#5B21B6}
.card h3{font-size:15px;font-weight:600;margin-bottom:2px}
.card .zh{font-size:12px;color:#9CA3AF;margin-bottom:4px}
.card .desc{font-size:12px;color:#6B7280;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.card .actions{margin-top:10px;display:flex;gap:6px}
.card .actions button{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--blue)}
.card .actions button:hover{background:#EFF6FF}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:30px}
.modal{background:#fff;border-radius:14px;width:720px;max-width:92vw;max-height:82vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.15)}
.modal-hd{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.modal-hd h2{font-size:18px;font-weight:700}
.modal-hd .close{background:none;border:none;font-size:20px;cursor:pointer;color:#9CA3AF}
.modal-bd{padding:20px 24px}
.modal-sec{margin-bottom:18px}
.modal-sec h3{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:8px;text-transform:uppercase}
.spec-tbl{width:100%;border-collapse:collapse}
.spec-tbl td{padding:7px 10px;font-size:12px;border-bottom:1px solid #F3F4F6}
.spec-tbl td:first-child{color:#6B7280;width:35%}
.hl-list{list-style:none}
.hl-list li{padding:5px 0;font-size:13px;color:#374151;border-bottom:1px solid #F3F4F6}
.modal-bd .gen-btn{display:inline-block;margin-top:12px;padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.modal-bd .gen-btn:hover{background:#1D4ED8}
/* AI Writer panel */
.ai-panel{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 24px}
.ai-panel h3{font-size:15px;font-weight:600;margin-bottom:12px}
.ai-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.ai-row label{display:block;font-size:11px;font-weight:600;color:#6B7280;margin-bottom:4px}
.ai-row select,.ai-row input{width:200px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none}
.ai-row select:focus,.ai-row input:focus{border-color:var(--blue)}
.ai-gen{display:block;width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.ai-gen:hover{background:#1D4ED8}
.ai-gen:disabled{background:#9CA3AF}
.ai-result{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px;min-height:100px;max-height:500px;overflow-y:auto;font-size:13px;line-height:1.8;white-space:pre-wrap}
.ai-result .btn-row{display:flex;gap:8px;margin-top:12px}
.ai-result .btn-row button{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border)}
.btn-copy{background:#EFF6FF;color:var(--blue);border-color:#BFDBFE}
.btn-regen{background:var(--bg);color:#374151}
</style></head><body>

<div id="loginPage"><div class="login">
<h2>OrionStar Product KB</h2><div class="sub">Product Knowledge Base + AI Content Writer</div>
<input id="loginEmail" placeholder="Email" value="admin@local">
<input type="password" id="loginPw" placeholder="Password" value="orgmind2026">
<button onclick="doLogin()">Sign In</button><div class="err" id="loginErr"></div></div></div>

<div id="app" class="hidden">
<header><div class="brand">ORIONSTAR Product KB</div>
<div class="user"><span id="userName"></span><button onclick="logout()">Sign Out</button></div></header>
<div class="tools">
<input id="searchInput" placeholder="Search products..." oninput="doSearch()">
<div style="display:flex;gap:4px"> <button class="fbtn on" onclick="setFilter('')">All</button><button class="fbtn" onclick="setFilter('clean')">Cleaning</button><button class="fbtn" onclick="setFilter('delivery')">Delivery</button><button class="fbtn" onclick="setFilter('voice')">Voice</button><button class="fbtn" onclick="setFilter('platform')">Platform</button></div>
<button style="padding:5px 12px;border:1px dashed var(--border);border-radius:6px;font-size:11px;background:none;cursor:pointer;color:#9CA3AF" onclick="seed()">Import Products</button></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>
<div id="aiSection" class="hidden"></div></div>

<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)"><div class="modal" id="modalContent"></div></div>

<script>
var token=localStorage.getItem('os_token'),user=JSON.parse(localStorage.getItem('os_user')||'null');
var filter='',allProducts=[],CATS={clean:'Cleaning',delivery:'Delivery',voice:'Voice',platform:'Platform'};

async function doLogin(){
 var e=document.getElementById('loginEmail').value.trim()||'admin@local';
 var p=document.getElementById('loginPw').value||'orgmind2026';
 try{
  var r=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});
  var d=await r.json();
  if(!d.token){document.getElementById('loginErr').textContent=d.detail||'Login failed';return}
  token=d.token;user=d.user;localStorage.setItem('os_token',token);localStorage.setItem('os_user',JSON.stringify(user));
  document.getElementById('loginPage').classList.add('hidden');document.getElementById('app').classList.remove('hidden');
  document.getElementById('userName').textContent=user.name;loadAll();
 }catch(x){document.getElementById('loginErr').textContent='Error: '+x.message}
}
function logout(){token=null;user=null;localStorage.removeItem('os_token');localStorage.removeItem('os_user');location.reload()}
function api(method,path,data){
 var h={'Content-Type':'application/json'};if(token)h['Authorization']='Bearer '+token;
 return fetch(path,{method:method,headers:h,body:data?JSON.stringify(data):undefined}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
}
function setFilter(f){filter=f;document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('on',b.textContent.toLowerCase()===(f||'all'))});loadAll()}
function doSearch(){var q=document.getElementById('searchInput').value.trim();if(!q){loadAll();return}
 api('GET','/api/v1/easywiki/products/search?q='+encodeURIComponent(q)).then(function(r){allProducts=r.products;render()})}
async function loadAll(){
 document.getElementById('searchInput').value='';
 var url='/api/v1/easywiki/products';if(filter)url+='?category='+filter;
 try{var r=await api('GET',url);allProducts=r.products;render()}catch(e){}
}
function render(){
 var ps=allProducts||[];
 document.getElementById('stats').innerHTML=ps.length+' products'+(filter?' in '+CATS[filter]:'');
 if(!ps.length){document.getElementById('grid').innerHTML='<div style="text-align:center;padding:40px;color:#9CA3AF">No products. <a href="#" onclick="seed()" style="color:var(--blue)">Import 21 products</a></div>';return}
 document.getElementById('grid').innerHTML=ps.map(function(p){return'<div class="card"><span class="cat '+p.category+'">'+(CATS[p.category]||p.category)+'</span><h3>'+p.name+'</h3><div class="zh">'+p.name_zh+'</div><div class="desc">'+p.description+'</div><div class="actions"><button onclick="event.stopPropagation();showDetail(\''+p.product_key+'\')">View Details</button><button onclick="event.stopPropagation();openWriter(\''+p.product_key+'\')">AI Generate Content</button></div></div>'}).join('')
}

async function showDetail(key){
 try{var p=await api('GET','/api/v1/easywiki/products/'+key);
  var s=p.specifications||{},h=p.highlights||[];
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('modalContent').innerHTML='<div class="modal-hd"><div><h2>'+p.name+'</h2><div style="font-size:12px;color:#9CA3AF;margin-top:2px">'+p.name_zh+' ['+p.region+']</div></div><button class="close" onclick="document.getElementById(\'modalOverlay\').classList.add(\'hidden\')">&times;</button></div><div class="modal-bd"><p style="font-size:13px;color:#6B7280;line-height:1.6;margin-bottom:16px">'+p.description+'</p>'+(Object.keys(s).length?'<div class="modal-sec"><h3>Specifications</h3><table class="spec-tbl">'+Object.entries(s).map(function(e){return'<tr><td>'+e[0]+'</td><td>'+e[1]+'</td></tr>'}).join('')+'</table></div>':'')+(h.length?'<div class="modal-sec"><h3>Key Highlights</h3><ul class="hl-list">'+h.map(function(x){return'<li>'+x+'</li>'}).join('')+'</ul></div>':'')+'<button class="gen-btn" onclick="document.getElementById(\'modalOverlay\').classList.add(\'hidden\');openWriter(\''+key+'\')">AI Generate Content for This Product</button></div>'}catch(e){alert(e.message)}
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.add('hidden')}
async function seed(){await api('POST','/api/v1/easywiki/products/seed');loadAll()}

/* AI Writer */
var writerProduct=null,templates=[],models={};
async function openWriter(key){
 writerProduct=key;document.getElementById('aiSection').classList.remove('hidden');
 document.getElementById('aiSection').scrollIntoView({behavior:'smooth'});
 if(!templates.length)try{templates=(await api('GET','/api/v1/easywiki/templates')).templates||[]}catch(e){}
 if(!models.article)try{models=await api('GET','/api/v1/easywiki/models')}catch(e){}
 document.getElementById('aiSection').innerHTML='<div class="ai-panel"><h3>AI Content Writer</h3><p style="font-size:12px;color:#9CA3AF;margin-bottom:12px">Product: <strong>'+key+'</strong></p><div class="ai-row"><div><label>Template</label><select id="aiTemplate">'+(templates.map(function(t){return'<option value="'+t.id+'">'+t.name+'</option>'}).join(''))+'</select></div><div><label>Model</label><select id="aiModel">'+((models.article||[]).map(function(m){return'<option value="'+m.id+'">'+m.name+' ('+m.provider+')</option>'}).join(''))+'</select></div><div><label>Language</label><select id="aiLang"><option value="zh">Chinese</option><option value="en">English</option><option value="ja">Japanese</option><option value="ko">Korean</option><option value="ar">Arabic</option><option value="de">German</option><option value="fr">French</option><option value="es">Spanish</option></select></div></div><button class="ai-gen" id="aiGenBtn" onclick="doGenerate()">Generate Content</button><div id="aiResult"></div></div>'
}
async function doGenerate(){
 var b=document.getElementById('aiGenBtn');b.disabled=true;b.textContent='Generating...';
 var t=document.getElementById('aiTemplate').value,m=document.getElementById('aiModel').value,l=document.getElementById('aiLang').value;
 try{var r=await api('POST','/api/v1/easywiki/generate',{template_id:t,product_key:writerProduct,model_id:m,language:l});
  if(r.ok){document.getElementById('aiResult').innerHTML='<div class="ai-result">'+r.content+'<div class="btn-row"><button class="btn-copy" onclick="navigator.clipboard.writeText(this.parentElement.parentElement.textContent.replace(\"Copy Full Text\",\"\").replace(\"Regenerate\",\"\").trim())">Copy Full Text</button><button class="btn-regen" onclick="doGenerate()">Regenerate</button></div></div>'}
  else{document.getElementById('aiResult').innerHTML='<p style="color:#EF4444">'+r.error+'</p>'}
 }catch(e){document.getElementById('aiResult').innerHTML='<p style="color:#EF4444">Error: '+e.message+'</p>'}
 b.disabled=false;b.textContent='Generate Content'
}
document.getElementById('loginPw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
if(token){document.getElementById('loginPage').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('userName').textContent=user.name;loadAll()}
</script></body></html>
