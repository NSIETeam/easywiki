<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>
  <g transform="translate(128,128)">
    <!-- Brain/neural network icon -->
    <circle r="35" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
    <circle cx="0" cy="-20" r="8" fill="white" opacity="0.9"/>
    <circle cx="-20" cy="12" r="6" fill="white" opacity="0.8"/>
    <circle cx="20" cy="12" r="6" fill="white" opacity="0.8"/>
    <line x1="0" y1="-20" x2="-20" y2="12" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-20" x2="20" y2="12" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-20" y1="12" x2="20" y2="12" stroke="white" stroke-width="2" opacity="0.5"/>
    <!-- OrgMind text -->
    <text y="70" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="32" font-weight="bold" opacity="0.95">OrgMind</text>
  </g>
</svg>
